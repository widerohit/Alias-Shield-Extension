<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AliasShield</title>
    <link rel="stylesheet" href="../styles/popup.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>AliasShield</h1>
          <p id="domainText">Smart signup aliases</p>
        </div>
        <button id="openSettings" class="icon-button" type="button" title="Open settings" aria-label="Open settings">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
            <path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.05.05a2.2 2.2 0 1 1-3.11 3.11l-.05-.05a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.09 1.65V21.5a2.2 2.2 0 1 1-4.4 0v-.12a1.8 1.8 0 0 0-1.09-1.65 1.8 1.8 0 0 0-1.98.36l-.05.05a2.2 2.2 0 1 1-3.11-3.11l.05-.05A1.8 1.8 0 0 0 4.6 15a1.8 1.8 0 0 0-1.65-1.09H2.8a2.2 2.2 0 1 1 0-4.4h.15A1.8 1.8 0 0 0 4.6 8.42a1.8 1.8 0 0 0-.36-1.98l-.05-.05a2.2 2.2 0 1 1 3.11-3.11l.05.05a1.8 1.8 0 0 0 1.98.36 1.8 1.8 0 0 0 1.09-1.65V1.9a2.2 2.2 0 1 1 4.4 0v.14a1.8 1.8 0 0 0 1.09 1.65 1.8 1.8 0 0 0 1.98-.36l.05-.05a2.2 2.2 0 1 1 3.11 3.11l-.05.05a1.8 1.8 0 0 0-.36 1.98 1.8 1.8 0 0 0 1.65 1.09h.15a2.2 2.2 0 1 1 0 4.4h-.15A1.8 1.8 0 0 0 19.4 15Z"></path>
          </svg>
        </button>
      </header>

      <section class="alias-panel">
        <div class="alias-panel__head">
          <span class="eyebrow">Generated alias</span>
          <button id="regenAlias" class="icon-button" type="button" title="Regenerate alias" aria-label="Regenerate alias">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 12a9 9 0 0 1-15.36 6.36"></path>
              <path d="M3 12A9 9 0 0 1 18.36 5.64"></path>
              <path d="M18 2v4h-4"></path>
              <path d="M6 22v-4h4"></path>
            </svg>
          </button>
        </div>
        <output id="aliasText" class="alias-text">Set your Gmail first</output>
        <div class="meta">
          <span id="domainMeta">Domain: -</span>
          <span id="timeMeta">Timestamp: -</span>
        </div>
        <div class="action-grid">
          <button id="copyAlias" type="button">Copy</button>
        </div>
        <p id="actionStatus" class="status"></p>
      </section>

      <section class="site-control">
        <button id="toggleSite" type="button">Disable on this site</button>
      </section>

      <section class="history-head">
        <h2>Recent aliases</h2>
        <div class="clear-control">
          <button id="clearHistory" class="icon-button danger-button" type="button" title="Clear alias history" aria-label="Clear alias history">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 6h18"></path>
              <path d="M8 6V4h8v2"></path>
              <path d="M19 6l-1 14H6L5 6"></path>
              <path d="M10 11v5M14 11v5"></path>
            </svg>
          </button>
          <section id="clearConfirm" class="confirm-panel" hidden>
            <strong>Clear all?</strong>
            <div class="confirm-actions">
              <button id="cancelClear" type="button">Cancel</button>
              <button id="confirmClear" class="danger-action" type="button">Clear</button>
            </div>
          </section>
        </div>
        <input id="historySearch" type="search" placeholder="Search">
      </section>

      <section id="historyList" class="history-list" aria-live="polite"></section>

      <footer class="export-bar">
        <button id="exportTxt" type="button">Export TXT</button>
        <button id="exportCsv" type="button">Export CSV</button>
        <button id="copyBlockQuery" type="button">Copy Gmail Query</button>
      </footer>
    </main>

    <script src="../utils/domain.js"></script>
    <script src="../utils/generator.js"></script>
    <script src="../utils/storage.js"></script>
    <script src="../utils/export.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
